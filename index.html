<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дашборд продаж</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        h2 { color: #2c3e50; font-size: 18px; margin: 0 0 15px 0; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; }
        .url-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .url-row input { flex: 1; min-width: 250px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #2980b9; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .btn-success { background: #27ae60; }
        .btn-secondary { background: #95a5a6; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 13px; color: #7f8c8d; margin-bottom: 5px; }
        .filter-group input[type="date"] { padding: 8px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi-card { text-align: center; border-top: 4px solid #3498db; }
        .kpi-card.revenue { border-top-color: #2ecc71; }
        .kpi-card.avg { border-top-color: #f39c12; }
        .kpi-card.clients { border-top-color: #9b59b6; }
        .kpi-card.products { border-top-color: #e67e22; }
        .kpi-value { font-size: 24px; font-weight: bold; margin: 8px 0; color: #2c3e50; }
        .kpi-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; }
        .chart-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
        .chart-card { position: relative; height: 400px; }
        .chart-card.tall { height: 500px; }
        .error { color: #e74c3c; margin-top: 10px; font-weight: bold; }
        .status { margin-top: 10px; font-size: 13px; color: #7f8c8d; }
        .status.success { color: #27ae60; }
        .hidden { display: none !important; }
        .debug-info { background: #fff3cd; padding: 12px; border-radius: 5px; margin-top: 15px; text-align: left; font-size: 11px; font-family: 'Courier New', monospace; white-space: pre-wrap; word-wrap: break-word; max-height: 500px; overflow-y: auto; line-height: 1.4; }
        .debug-section { margin: 10px 0; padding: 8px; background: rgba(255,255,255,0.5); border-radius: 3px; }
        .debug-title { font-weight: bold; color: #856404; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Аналитика продаж</h1>

    <div class="card">
        <h2>Источник данных</h2>
        <div class="url-row">
            <input type="text" id="sheetUrl" placeholder="Ссылка на Google-таблицу (с открытым доступом)...">
            <button class="btn btn-success" id="loadBtn">📥 Загрузить</button>
            <button class="btn" id="refreshBtn" disabled>🔄 Обновить</button>
        </div>
        <div id="statusMsg" class="status"></div>
        <div id="errorMsg" class="error"></div>
        <div id="debugInfo" class="debug-info hidden"></div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="filter-row">
            <div class="filter-group"><label for="dateFrom">Период с:</label><input type="date" id="dateFrom"></div>
            <div class="filter-group"><label for="dateTo">по:</label><input type="date" id="dateTo"></div>
            <button class="btn btn-secondary" id="resetFilter">Сбросить</button>
            <div style="margin-left: auto; color: #7f8c8d; font-size: 13px;" id="filterInfo"></div>
        </div>

        <div class="kpi-grid">
            <div class="card kpi-card revenue"><div class="kpi-label">Общая выручка</div><div class="kpi-value" id="totalRevenue">0 ₽</div></div>
            <div class="card kpi-card avg"><div class="kpi-label">Средний чек</div><div class="kpi-value" id="avgCheck">0 ₽</div></div>
            <div class="card kpi-card"><div class="kpi-label">Всего продаж</div><div class="kpi-value" id="totalSales">0</div></div>
            <div class="card kpi-card clients"><div class="kpi-label">Уникальных клиентов</div><div class="kpi-value" id="totalClients">0</div></div>
            <div class="card kpi-card products"><div class="kpi-label">Уникальных продуктов</div><div class="kpi-value" id="totalProducts">0</div></div>
        </div>

        <div class="chart-grid">
            <div class="card chart-card"><h2>Выручка по месяцам</h2><canvas id="monthlyChart"></canvas></div>
        </div>
        <div class="chart-row">
            <div class="card chart-card tall" id="clientsCard"><h2>Топ-10 клиентов по выручке</h2><canvas id="clientsChart"></canvas></div>
            <div class="card chart-card tall" id="productsCard"><h2>Топ-10 продуктов по выручке</h2><canvas id="productsChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const sheetUrlInput = document.getElementById('sheetUrl');
    const loadBtn = document.getElementById('loadBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusMsg = document.getElementById('statusMsg');
    const errorMsg = document.getElementById('errorMsg');
    const debugInfo = document.getElementById('debugInfo');
    const dashboard = document.getElementById('dashboard');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const resetFilter = document.getElementById('resetFilter');
    const filterInfo = document.getElementById('filterInfo');

    let rawData = [], columnMap = {}, charts = {}, globalMinDate = null, globalMaxDate = null;
    const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

    function extractTableId(url) {
        const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
        if (!match) throw new Error('Неверная ссылка');
        return match[1];
    }

    function extractGid(url) {
        const match = url.match(/[?&]gid=(\d+)/);
        return match ? match[1] : '0';
    }

    async function loadData() {
        const url = sheetUrlInput.value.trim();
        if (!url) { showError('Вставьте ссылку'); return; }

        let tableId, gid;
        try {
            tableId = extractTableId(url);
            gid = extractGid(url);
        } catch (e) { showError(e.message); return; }

        setStatus('Загрузка...', 'loading');
        loadBtn.disabled = true;
        errorMsg.textContent = '';
        debugInfo.innerHTML = '';
        debugInfo.classList.remove('hidden');

        const queryUrl = `https://docs.google.com/spreadsheets/d/${tableId}/gviz/tq?tqx=out:csv&gid=${gid}&_=${Date.now()}`;

        try {
            const response = await fetch(queryUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            if (text.trim().startsWith('<!')) throw new Error('Таблица закрыта');
            const lines = text.split('\n').filter(l => l.trim());
            if (lines.length < 2) throw new Error('Файл пуст');
            parseFile(lines);
            setStatus(`✅ Загружено: ${rawData.length} строк. Обновлено: ${new Date().toLocaleTimeString('ru-RU')}`, 'success');
            refreshBtn.disabled = false;
        } catch (err) {
            debugInfo.innerHTML += `\n❌ Ошибка: ${err.message}\n`;
            showError('Ошибка: ' + err.message);
            loadBtn.disabled = false;
        }
    }

    function setStatus(msg, type) { statusMsg.textContent = msg; statusMsg.className = 'status ' + (type || ''); }
    function showError(msg) { errorMsg.textContent = msg; setStatus('', ''); }

    loadBtn.addEventListener('click', loadData);
    refreshBtn.addEventListener('click', loadData);
    sheetUrlInput.addEventListener('keypress', e => { if (e.key === 'Enter') loadData(); });

    function detectDelimiter(line) {
        const comma = (line.match(/,/g) || []).length;
        const semi = (line.match(/;/g) || []).length;
        return semi > comma ? ';' : ',';
    }

    function parseCSVLine(line, delimiter) {
        const result = [];
        let current = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') { if (inQuotes && line[i+1] === '"') { current += '"'; i++; } else inQuotes = !inQuotes; }
            else if (char === delimiter && !inQuotes) { result.push(current.trim()); current = ''; }
            else current += char;
        }
        result.push(current.trim());
        return result;
    }

    function parseDate(str) {
    if (!str) return null;
    str = String(str).trim();
    
    // ДД.ММ.ГГГГ (4-значный год)
    if (/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(str)) {
        const parts = str.split('.');
        const day = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        const year = parseInt(parts[2]);
        if (day <= 31 && month <= 12 && year > 1900) {
            return new Date(year, month - 1, day);
        }
    }
    
    // ДД.ММ.ГГ (2-значный год) — ВАШ ФОРМАТ!
    if (/^\d{1,2}\.\d{1,2}\.\d{2}$/.test(str)) {
        const parts = str.split('.');
        const day = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        let year = parseInt(parts[2]);
        // Добавляем 2000 для двузначного года
        year = year < 100 ? 2000 + year : year;
        if (day <= 31 && month <= 12) {
            return new Date(year, month - 1, day);
        }
    }
    
    // Число Excel
    if (/^\d+$/.test(str)) {
        const excelDate = parseInt(str);
        if (excelDate > 30000 && excelDate < 100000) {
            return new Date((excelDate - 25569) * 86400 * 1000);
        }
    }
    
    // ДД/ММ/ГГГГ
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)) {
        const parts = str.split('/');
        const first = parseInt(parts[0]);
        const second = parseInt(parts[1]);
        const year = parseInt(parts[2]);
        if (first > 12 && second <= 12) {
            return new Date(year, second - 1, first);
        }
        if (second > 12 && first <= 12) {
            return new Date(year, first - 1, second);
        }
        return new Date(year, second - 1, first);
    }
    
    // ГГГГ-ММ-ДД
    if (/^\d{4}-\d{2}-\d{2}/.test(str)) {
        const d = new Date(str);
        if (!isNaN(d.getTime())) return d;
    }
    
    // Fallback
    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
}

    function parseSum(str) {
        if (typeof str === 'number') return str;
        if (!str) return NaN;
        str = String(str).trim();
        // Убираем пробелы, неразрывные пробелы, заменяем запятую на точку
        str = str.replace(/[\s\u00A0]/g, '').replace(',', '.');
        const num = parseFloat(str);
        return isNaN(num) ? NaN : num;
    }

    function parseFile(lines) {
        const delimiter = detectDelimiter(lines[0]);
        const headers = parseCSVLine(lines[0], delimiter).map(h => h.toLowerCase().trim());
        const dateIdx = headers.findIndex(h => h.includes('дата'));
        const clientIdx = headers.findIndex(h => h.includes('клиент'));
        const productIdx = headers.findIndex(h => h.includes('продукт') || h.includes('товар') || h.includes('наимен'));
        const sumIdx = headers.findIndex(h => h.includes('сумм') || h.includes('выруч'));

        if (dateIdx === -1 || sumIdx === -1) throw new Error('Не найдены колонки «Дата» и «Сумма»');
        columnMap = { date: dateIdx, client: clientIdx, product: productIdx, sum: sumIdx };

        // Показываем заголовки
        debugInfo.innerHTML += `<div class="debug-section"><div class="debug-title">📋 Заголовки колонок:</div>`;
        headers.forEach((h, i) => {
            const marker = i === dateIdx ? ' [ДАТА]' : i === sumIdx ? ' [СУММА]' : i === clientIdx ? ' [КЛИЕНТ]' : i === productIdx ? ' [ПРОДУКТ]' : '';
            debugInfo.innerHTML += `  ${i}: "${h}"${marker}\n`;
        });
        debugInfo.innerHTML += `</div>`;

        // Показываем первые 5 строк сырых данных
        debugInfo.innerHTML += `<div class="debug-section"><div class="debug-title">📊 Первые 5 строк данных (сырые):</div>`;
        for (let i = 1; i < Math.min(6, lines.length); i++) {
            const row = parseCSVLine(lines[i], delimiter);
            debugInfo.innerHTML += `  Строка ${i}: ${JSON.stringify(row)}\n`;
        }
        debugInfo.innerHTML += `</div>`;

        rawData = [];
        const skippedRows = [];
        let minDate = null, maxDate = null;
        
        for (let i = 1; i < lines.length; i++) {
            const row = parseCSVLine(lines[i], delimiter);
            if (!row.length) continue;
            
            const rawDate = row[dateIdx];
            const rawSum = row[sumIdx];
            const dateObj = parseDate(rawDate);
            const sumVal = parseSum(rawSum);
            
            if (!dateObj) {
                skippedRows.push({ line: i, reason: 'Неверная дата', raw: rawDate, row });
                continue;
            }
            if (isNaN(sumVal)) {
                skippedRows.push({ line: i, reason: 'Неверная сумма', raw: rawSum, row });
                continue;
            }
            
            const client = clientIdx >= 0 ? (row[clientIdx] || '—').trim() : null;
            const product = productIdx >= 0 ? (row[productIdx] || '—').trim() : null;
            rawData.push({ date: dateObj, client, product, sum: sumVal });
            
            if (!minDate || dateObj < minDate) minDate = dateObj;
            if (!maxDate || dateObj > maxDate) maxDate = dateObj;
        }
        
        if (rawData.length === 0) throw new Error('Нет валидных данных');

        // Показываем пропущенные строки
        if (skippedRows.length > 0) {
            debugInfo.innerHTML += `<div class="debug-section"><div class="debug-title">⚠️ Пропущенные строки (${skippedRows.length}):</div>`;
            skippedRows.slice(0, 10).forEach(s => {
                debugInfo.innerHTML += `  Строка ${s.line}: ${s.reason} — "${s.raw}"\n`;
            });
            if (skippedRows.length > 10) {
                debugInfo.innerHTML += `  ... и ещё ${skippedRows.length - 10} строк\n`;
            }
            debugInfo.innerHTML += `</div>`;
        }

        globalMinDate = minDate; globalMaxDate = maxDate;
        dateFrom.value = formatDateISO(minDate);
        dateTo.value = formatDateISO(maxDate);

        debugInfo.innerHTML += `<div class="debug-section"><div class="debug-title">✅ Результат:</div>`;
        debugInfo.innerHTML += `  Загружено: ${rawData.length} строк\n`;
        debugInfo.innerHTML += `  Пропущено: ${skippedRows.length} строк\n`;
        debugInfo.innerHTML += `  Период: ${minDate.toLocaleDateString('ru-RU')} — ${maxDate.toLocaleDateString('ru-RU')}\n`;
        debugInfo.innerHTML += `</div>`;

        dashboard.classList.remove('hidden');
        if (clientIdx === -1) document.getElementById('clientsCard').classList.add('hidden');
        if (productIdx === -1) document.getElementById('productsCard').classList.add('hidden');
        renderAll();
    }

    function formatDateISO(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    dateFrom.addEventListener('change', renderAll);
    dateTo.addEventListener('change', renderAll);
    resetFilter.addEventListener('click', () => { dateFrom.value = formatDateISO(globalMinDate); dateTo.value = formatDateISO(globalMaxDate); renderAll(); });

    function getFilteredData() {
        const from = dateFrom.value ? new Date(dateFrom.value) : null;
        const to = dateTo.value ? new Date(dateTo.value + 'T23:59:59') : null;
        return rawData.filter(r => !(from && r.date < from) && !(to && r.date > to));
    }

    function renderAll() {
        const data = getFilteredData();
        filterInfo.textContent = data.length === rawData.length ? `Все: ${data.length} записей` : `Отфильтровано: ${data.length} из ${rawData.length}`;
        renderKPI(data);
        renderMonthlyChart(data);
        if (columnMap.client >= 0) renderTopChart(data, 'client', 'clientsChart', '#9b59b6');
        if (columnMap.product >= 0) renderTopChart(data, 'product', 'productsChart', '#e67e22');
    }

    function renderKPI(data) {
        const totalRevenue = data.reduce((s, r) => s + r.sum, 0);
        const avgCheck = data.length ? totalRevenue / data.length : 0;
        const clients = new Set(data.map(r => r.client).filter(Boolean)).size;
        const products = new Set(data.map(r => r.product).filter(Boolean)).size;
        document.getElementById('totalRevenue').textContent = formatCurrency(totalRevenue);
        document.getElementById('avgCheck').textContent = formatCurrency(avgCheck);
        document.getElementById('totalSales').textContent = data.length.toLocaleString('ru-RU');
        document.getElementById('totalClients').textContent = clients.toLocaleString('ru-RU');
        document.getElementById('totalProducts').textContent = products.toLocaleString('ru-RU');
    }

    function renderMonthlyChart(data) {
        const monthly = {};
        data.forEach(r => {
            const key = `${r.date.getFullYear()}-${String(r.date.getMonth()+1).padStart(2,'0')}`;
            const label = `${monthNames[r.date.getMonth()]} ${r.date.getFullYear()}`;
            if (!monthly[key]) monthly[key] = { label, sum: 0 };
            monthly[key].sum += r.sum;
        });
        const sorted = Object.keys(monthly).sort();
        renderBarChart('monthlyChart', sorted.map(k => monthly[k].label), sorted.map(k => monthly[k].sum), 'rgba(52, 152, 219, 0.8)', false);
    }

    function renderTopChart(data, field, canvasId, color) {
        const agg = {};
        data.forEach(r => { agg[r[field] || '—'] = (agg[r[field] || '—'] || 0) + r.sum; });
        const sorted = Object.entries(agg).sort((a, b) => b[1] - a[1]).slice(0, 10);
        renderBarChart(canvasId, sorted.map(e => e[0]), sorted.map(e => e[1]), color, field === 'client');
    }

    function renderBarChart(canvasId, labels, data, color, horizontal) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (charts[canvasId]) charts[canvasId].destroy();
        charts[canvasId] = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Выручка', data, backgroundColor: color, borderRadius: 4 }] },
            options: {
                indexAxis: horizontal ? 'y' : 'x',
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => 'Выручка: ' + formatCurrency(ctx.raw) } } },
                scales: {
                    x: horizontal ? { ticks: { callback: v => formatCurrency(v) } } : { ticks: { maxRotation: 45 } },
                    y: horizontal ? {} : { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } }
                }
            }
        });
    }

    function formatCurrency(value) {
        return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(value);
    }
</script>
</body>
</html>
